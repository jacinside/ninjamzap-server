Port 2050

MaxUsers 6
MaxChannels 32 8

ServerLicense cclicense.txt

# Status user/pass for backend health probes and /server-list. Read-only:
# priv=0, max_channels=0. Rendered from Fly secrets at container startup
# (see configs/entrypoint.sh). Rotate by updating STATUS_USER / STATUS_PASS.
StatusUserPass ${STATUS_USER} ${STATUS_PASS}

AnonymousUsers yes
AnonymousUsersCanChat yes
AnonymousMaskIP yes

# Required so the audio-relay/recording bot below can connect with its
# PRIV_HIDDEN flag. Hidden users don't appear in the user-list broadcast
# and are excluded from the BPM/BPI vote divisor (usercon.cpp:1492).
AllowHiddenUsers yes
AllowVideoChannels yes
SendBufferKB 4096
RecvBufferKB 2048

ACL 0.0.0.0/0 allow

DefaultTopic "Have fun, listen first, then jam. Be kind to other musicians. Buena Zapada!"
DefaultBPM 120
DefaultBPI 16

MOTDFile /opt/ninjam/motd.txt

SetVotingThreshold 50
SetVotingVoteTimeout 60

# NinjamZap audio-relay / live-stream bot. Privileges:
#   C — can chat (announces "now recording" / stream URL on request)
#   H — hidden: not in user list, not in slot cap, not in vote divisor
# Deliberately no V (can't !vote) and no T/B/K (can't moderate the room).
# Password rendered from Fly secret BOT_PASS at container startup.
User ninjamzapbot ${BOT_PASS} CH

# No LogFile — output goes to stdout for Fly.io log capture
