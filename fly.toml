app = 'ninjamzap-server'
primary_region = 'dfw'

[build]

[[services]]
  internal_port = 2049
  protocol = 'tcp'
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 2049
    handlers = []

# No health checks — NINJAM server treats health check TCP probes
# as failed client connections, causing unnecessary log noise

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
